<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabiduría Diaria v3 - Nico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; transition: all 0.3s ease; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: var(--card); border: 1px solid rgba(148, 163, 184, 0.1); shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-4xl w-full space-y-8">
        <div class="text-center">
            <p id="fecha-actual" class="text-amber-500 font-bold tracking-widest text-xs uppercase mb-2"></p>
            <h1 class="text-4xl font-bold tracking-tight">Sabiduría para hoy 🙌</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass rounded-3xl p-8 space-y-4">
                <span class="text-[10px] font-bold opacity-50 uppercase tracking-widest">RVR 1960</span>
                <p id="texto-rvr" class="serif text-xl italic leading-relaxed"></p>
                <p id="cita-rvr" class="text-sm font-bold opacity-40"></p>
            </div>
            <div class="glass rounded-3xl p-8 space-y-4 border-l-4 border-l-amber-400">
                <span class="text-[10px] font-bold opacity-50 uppercase tracking-widest text-amber-500">NTV</span>
                <p id="texto-ntv" class="serif text-xl italic leading-relaxed"></p>
                <p id="cita-ntv" class="text-sm font-bold opacity-40"></p>
            </div>
        </div>

        <div class="glass rounded-3xl p-8 space-y-4">
            <h3 class="font-semibold flex items-center gap-2">
                <span>📝</span> Mi reflexión de hoy:
            </h3>
            <textarea id="reflexion-user" 
                class="w-full bg-transparent border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl p-4 focus:border-amber-400 focus:outline-none transition-colors"
                rows="3" placeholder="¿Cómo aplicarás esto hoy, Nico?"></textarea>
            <p class="text-[10px] opacity-50 text-right">Se guarda automáticamente en tu navegador ✨</p>
        </div>

        <div class="flex justify-center gap-4">
            <button id="copyBtn" class="bg-slate-800 text-white px-6 py-3 rounded-2xl hover:bg-black transition-all active:scale-95 text-sm font-medium">
                Copiar Versículos
            </button>
        </div>
    </div>

    <script>
        const proverbios = [
            { cita: "Proverbios 3:5", rvr: "Fíate de Jehová de todo tu corazón, y no te apoyes en tu propia prudencia.", ntv: "Confía en el Señor con todo tu corazón; no dependas de tu propio entendimiento." },
            { cita: "Proverbios 16:3", rvr: "Encomienda a Jehová tus obras, y tus pensamientos serán afirmados.", ntv: "Pon todo lo que hagas en manos del Señor, y tus planes tendrán éxito." },
            { cita: "Proverbios 4:23", rvr: "Sobre toda cosa guardada, guarda tu corazón; porque de él mana la vida.", ntv: "Sobre todas las cosas cuida tu corazón, porque este determina el rumbo de tu vida." },
            { cita: "Proverbios 15:1", rvr: "La blanda respuesta quita la ira; mas la palabra áspera hace subir el furor.", ntv: "La respuesta apacible desvía el enojo, pero las palabras ásperas encienden los ánimos." }
            // ... (aquí irían los demás)
        ];

        function init() {
            const now = new Date();
            const dateKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
            const seed = (now.getDate() * 7) + (now.getMonth() * 31) + now.getFullYear();
            const item = proverbios[seed % proverbios.length];

            // Render
            document.getElementById('fecha-actual').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('texto-rvr').innerText = `"${item.rvr}"`;
            document.getElementById('cita-rvr').innerText = item.cita;
            document.getElementById('texto-ntv').innerText = `"${item.ntv}"`;
            document.getElementById('cita-ntv').innerText = item.cita;

            // Lógica de Reflexión
            const textArea = document.getElementById('reflexion-user');
            const savedNote = localStorage.getItem(`nota-${dateKey}`);
            if (savedNote) textArea.value = savedNote;

            textArea.addEventListener('input', (e) => {
                localStorage.setItem(`nota-${dateKey}`, e.target.value);
            });

            // Copiar
            document.getElementById('copyBtn').onclick = () => {
                const text = `📖 ${item.cita}\n\nRVR1960: ${item.rvr}\nNTV: ${item.ntv}`;
                navigator.clipboard.writeText(text);
                alert("¡Copiado para compartir! 🚀");
            };
        }

        window.onload = init;
    </script>
</body>
</html>
